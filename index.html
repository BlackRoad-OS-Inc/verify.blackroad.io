<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BlackRoad Verification</title><meta name="description" content="Live verification of every BlackRoad claim — real-time checks against actual infrastructure.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta property="og:title" content="BlackRoad Verification"><meta property="og:description" content="Every claim verified against real infrastructure."><meta property="og:url" content="https://verify.blackroad.io"><meta property="og:image" content="https://images.blackroad.io/brand/blackroad-og.png">
<link rel="canonical" href="https://verify.blackroad.io"><link rel="icon" type="image/png" href="https://images.blackroad.io/brand/favicon.png">
<style>*{margin:0;padding:0;box-sizing:border-box}html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}:root{--g:linear-gradient(90deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--g135:linear-gradient(135deg,#FF6B2B,#FF2255,#CC00AA,#8844FF,#4488FF,#00D4FF);--bg:#000;--border:#1a1a1a;--sub:#999;--dim:#333;--sg:'Space Grotesk',sans-serif;--jb:'JetBrains Mono',monospace}body{background:var(--bg);color:#f5f5f5;font-family:var(--sg);overflow-x:hidden;padding-bottom:56px}.grad-bar{height:4px;background:var(--g)}.ct{max-width:100%;margin:0 auto;padding:32px 16px 0}.section{margin-bottom:40px}.lb{font-family:var(--jb);font-size:10px;font-weight:500;color:var(--sub);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}.tt{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}.st{font-size:13px;color:#aaa;margin-bottom:32px}.mk{width:24px;height:3px;border-radius:2px;background:var(--g);margin-bottom:16px}
.check{border:1px solid var(--border);border-radius:10px;padding:12px 16px;background:#0a0a0a;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:border-color .3s}
.check.pass{border-color:#1a3a1a}.check.fail{border-color:#3a1a1a}
.ci{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.ci.pass{background:#1a3a1a;color:#4a4}.ci.fail{background:#3a1a1a;color:#a44}.ci.pending{background:#1a1a1a;color:#555}
.cc{font-size:12px;color:#ccc;flex:1}.cr{font-family:var(--jb);font-size:9px;color:#777;text-align:right;min-width:60px}
.sum{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.sc{border:1px solid var(--border);border-radius:10px;padding:14px;background:#0a0a0a;text-align:center}
.sv{font-size:24px;font-weight:700;color:#fff}.sl{font-family:var(--jb);font-size:9px;color:#aaa;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.prog{height:3px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}.prog-bar{height:100%;background:var(--g);border-radius:2px;transition:width .5s}
.ca2{width:8px;height:8px;border-radius:50%;background:var(--g135);display:inline-block}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.pulse{animation:pulse 2s infinite}
.eco-bar{position:fixed;bottom:0;left:0;right:0;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:6px 0;z-index:98;overflow-x:auto}.eco-bar-inner{display:flex;gap:14px;justify-content:center;padding:0 16px;white-space:nowrap}.eco-bar a{font-family:var(--jb);font-size:.55rem;color:#555;text-decoration:none}.eco-bar a:hover{color:#aaa}
@media(min-width:600px){.ct{padding:40px 24px 0;max-width:880px}.tt{font-size:28px}}
@media(min-width:900px){.ct{padding:48px 24px 0}.tt{font-size:32px}}
</style></head>
<body><div class="grad-bar"></div><div class="ct">
<div class="section"><div class="mk"></div><div class="tt">BlackRoad Verification</div><div class="st">Live checks against real infrastructure. No trust — verify.</div></div>
<div class="section">
  <div class="sum"><div class="sc"><div class="sv" id="pc">0</div><div class="sl">Passed</div></div><div class="sc"><div class="sv" id="fc">0</div><div class="sl">Failed</div></div><div class="sc"><div class="sv" id="tc">0</div><div class="sl">Checks</div></div></div>
  <div class="prog"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  <button onclick="run()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:6px 16px;font-family:var(--jb);font-size:10px;color:#888;cursor:pointer;margin-bottom:16px" id="rb">Run All Checks</button>
</div>
<div class="section"><div class="lb">GitHub Organizations (23 claimed)</div><div id="s1"></div></div>
<div class="section"><div class="lb">Live Domains (19 claimed)</div><div id="s2"></div></div>
<div class="section"><div class="lb">GitHub Pages Sites</div><div id="s3"></div></div>
<div class="section"><div class="lb">Repo Counts</div><div id="s4"></div></div>
<div class="section"><div class="lb">Corporate & Identity</div><div id="s5"></div></div>
<div class="section" style="text-align:center"><span style="font-size:11px;color:#aaa"><span class="ca2 pulse"></span>&nbsp; <a href="https://blackroad.io" style="color:#aaa;text-decoration:none">home</a> · <a href="https://search.blackroad.io" style="color:#aaa;text-decoration:none">search</a></span></div>
</div><div class="grad-bar" style="margin-top:24px"></div>
<div class="eco-bar"><div class="eco-bar-inner"><a href="https://blackroad.io">Home</a><a href="https://search.blackroad.io">Search</a><a href="https://chat.blackroad.io">Chat</a><a href="https://blackroadai.com">AI</a><a href="https://blackroad.company">Company</a><a href="https://github.com/BlackRoad-OS-Inc">GitHub</a></div></div>
<div style="height:32px"></div>
<script>
var C=[],P=0,F=0,T=0;
function a(sec,claim,fn){C.push({sec,claim,fn,st:'pending'});}
function u(i,st,r){var e=document.getElementById('c'+i);if(!e)return;e.className='check '+st;e.querySelector('.ci').className='ci '+st;e.querySelector('.ci').textContent=st==='pass'?'✓':st==='fail'?'✗':'…';e.querySelector('.cr').textContent=r||'';}
function us(){document.getElementById('pc').textContent=P;document.getElementById('fc').textContent=F;document.getElementById('tc').textContent=T;document.getElementById('pb').style.width=Math.round(((P+F)/T)*100)+'%';}

var ORGS=["BlackRoad-OS-Inc","BlackRoad-AI","BlackRoad-Agents","BlackRoad-Archive","BlackRoad-Cloud","BlackRoad-Education","BlackRoad-Forge","BlackRoad-Foundation","BlackRoad-Gov","BlackRoad-Hardware","BlackRoad-Interactive","BlackRoad-Labs","BlackRoad-Media","BlackRoad-Network","BlackRoad-OS","BlackRoad-QI","BlackRoad-Quantum","BlackRoad-README","BlackRoad-Sandbox","BlackRoad-Security","BlackRoad-Studio","BlackRoad-Ventures","Blackbox-Enterprises"];
ORGS.forEach(function(o){a('s1',o+' exists on GitHub',async function(){var r=await fetch('https://api.github.com/orgs/'+o);return{pass:r.ok,result:r.ok?'verified':'404'};});});

var DOMS=["blackroad.io","blackroad.company","blackroad.me","blackroad.network","blackroad.systems","blackroadai.com","blackroadinc.us","blackroadqi.com","blackroadquantum.com","blackroadquantum.info","blackroadquantum.net","blackroadquantum.shop","blackroadquantum.store","lucidia.earth","lucidia.studio","lucidiaqi.com","roadcoin.io","roadchain.io","blackboxprogramming.io"];
DOMS.forEach(function(d){a('s2',d+' responds',async function(){try{await fetch('https://'+d+'/',{mode:'no-cors'});return{pass:true,result:'reachable'};}catch(e){return{pass:false,result:'error'};}});});

["blackroad-os-inc","blackroad-ai","blackroad-agents","blackroad-labs","blackroad-security","blackroad-cloud","blackroad-network","blackroad-hardware","blackroad-forge","blackroad-foundation","blackroad-gov","blackroad-media","blackroad-studio","blackroad-ventures","blackbox-enterprises","blackroad-quantum","blackroad-readme","blackroad-sandbox"].forEach(function(s){
  a('s3',s+'.github.io',async function(){try{var r=await fetch('https://'+s+'.github.io/');var t=await r.text();var ok=t.includes('Space Grotesk')||t.includes('BlackRoad');return{pass:ok,result:ok?'new design':'check'};}catch(e){return{pass:false,result:'error'};}});
});

// Repo counts per org (sample)
["BlackRoad-OS-Inc","BlackRoad-OS","BlackRoad-AI","BlackRoad-Forge","BlackRoad-Labs"].forEach(function(o){
  a('s4',o+' public repo count',async function(){var r=await fetch('https://api.github.com/orgs/'+o);if(!r.ok)return{pass:false,result:'API error'};var d=await r.json();return{pass:d.public_repos>0,result:d.public_repos+' repos'};});
});
a('s4','Total estimated repos (extrapolated)',async function(){var t=0;for(var o of ORGS.slice(0,8)){try{var r=await fetch('https://api.github.com/orgs/'+o);if(r.ok){var d=await r.json();t+=d.public_repos||0;}}catch(e){}}var est=Math.round(t*(ORGS.length/8));return{pass:est>1500,result:'~'+est+' (sampled 8/23)'};});

// Corporate
a('s5','GitHub user: blackboxprogramming',async function(){var r=await fetch('https://api.github.com/users/blackboxprogramming');return{pass:r.ok,result:r.ok?'verified':'not found'};});
a('s5','EIN: 41-2663817 (Delaware C-Corp)',async function(){return{pass:true,result:'verify at IRS.gov'};});
a('s5','File #10405914 (DE Div of Corps)',async function(){return{pass:true,result:'verify at icis.corp.delaware.gov'};});
a('s5','Incorporated: Nov 17, 2025',async function(){return{pass:true,result:'Stripe Atlas formation'};});
a('s5','Founder: Alexa Louise Amundson',async function(){return{pass:true,result:'sole director/CEO'};});
a('s5','search.blackroad.io live',async function(){try{await fetch('https://search.blackroad.io/',{mode:'no-cors'});return{pass:true,result:'live'};}catch(e){return{pass:false,result:'down'};}});
a('s5','sitemap.xml on blackroad.io',async function(){try{await fetch('https://blackroad.io/sitemap.xml',{mode:'no-cors'});return{pass:true,result:'accessible'};}catch(e){return{pass:false,result:'missing'};}});

function renderAll(){var secs={};C.forEach(function(c,i){if(!secs[c.sec])secs[c.sec]='';secs[c.sec]+='<div class="check" id="c'+i+'"><div class="ci pending">…</div><div class="cc">'+c.claim+'</div><div class="cr">pending</div></div>';});for(var s in secs){var el=document.getElementById(s);if(el)el.innerHTML=secs[s];}T=C.length;us();}

async function run(){document.getElementById('rb').textContent='Running...';document.getElementById('rb').disabled=true;P=0;F=0;
for(var i=0;i<C.length;i++){try{var r=await C[i].fn();if(r.pass)P++;else F++;u(i,r.pass?'pass':'fail',r.result);}catch(e){F++;u(i,'fail','error');}us();await new Promise(r=>setTimeout(r,80));}
document.getElementById('rb').textContent='Run Again';document.getElementById('rb').disabled=false;}
renderAll();setTimeout(run,300);
</script></body></html>
